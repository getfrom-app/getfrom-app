<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Tree / Root symbol -->
  <g transform="translate(256, 240)" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trunk -->
    <line x1="0" y1="-100" x2="0" y2="120"/>
    <!-- Branches up -->
    <path d="M0,-100 C-20,-120 -60,-140 -80,-150"/>
    <path d="M0,-100 C20,-120 60,-140 80,-150"/>
    <path d="M0,-50 C-15,-65 -45,-80 -55,-85"/>
    <path d="M0,-50 C15,-65 45,-80 55,-85"/>
    <!-- Roots down -->
    <path d="M0,120 C-15,140 -50,160 -70,175"/>
    <path d="M0,120 C15,140 50,160 70,175"/>
    <path d="M0,120 C-8,135 -25,150 -35,160"/>
    <path d="M0,120 C8,135 25,150 35,160"/>
  </g>
</svg>
