<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer contraseña — Fromly</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .reset-page { max-width: 420px; margin: 80px auto; padding: 0 24px 80px; }
        .reset-card { background: var(--card-bg,#fff); border: 1px solid var(--border,#e5e5e5); border-radius: 14px; padding: 28px; }
        .reset-card h2 { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
        .reset-card p  { font-size: 14px; color: #666; margin: 0 0 20px; }
        .field-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .field-group label { font-size: 13px; font-weight: 500; color: #444; }
        .field-group input { border: 1px solid #ddd; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; width: 100%; box-sizing: border-box; outline: none; transition: border-color .15s; }
        .field-group input:focus { border-color: #007AFF; }
        .btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
        .btn-primary { background: #007AFF; color: #fff; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .error-msg   { background: rgba(255,59,48,.08); color: #dc2626; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
        .success-msg { background: rgba(52,199,89,.08);  color: #28a745; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 12px; }
        @media (prefers-color-scheme: dark) {
            .reset-card { background: #1c1c1e; border-color: #333; }
            .field-group input { background: #2c2c2e; border-color: #444; color: #fff; }
            .field-group label { color: #aaa; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22V8"/><path d="M12 8C12 8 8 4 8 2"/><path d="M12 8C12 8 16 4 16 2"/>
                <path d="M12 14C12 14 8 10 6 9"/><path d="M12 14C12 14 16 10 18 9"/>
            </svg>
            Fromly
        </a>
    </div>
</nav>

<div class="reset-page">
    <div class="reset-card">
        <h2>Nueva contraseña</h2>
        <p>Elige una contraseña segura para tu cuenta de Fromly.</p>

        <div id="error-msg"   class="error-msg"   style="display:none"></div>
        <div id="success-msg" class="success-msg" style="display:none"></div>

        <div id="form-body">
            <div class="field-group">
                <label>Nueva contraseña</label>
                <input type="password" id="new-pw" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
            </div>
            <div class="field-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirm-pw" placeholder="Repite la contraseña" autocomplete="new-password">
            </div>
            <button class="btn btn-primary" id="submit-btn" onclick="submit()">Guardar contraseña</button>
        </div>
    </div>
</div>

<script>
const API = "https://from-server-production.up.railway.app"
const params = new URLSearchParams(location.search)
const token = params.get("token")

if (!token) {
    document.getElementById("error-msg").textContent = "Enlace inválido o expirado. Solicita uno nuevo desde la app."
    document.getElementById("error-msg").style.display = "block"
    document.getElementById("form-body").style.display = "none"
}

async function submit() {
    const np = document.getElementById("new-pw").value
    const cp = document.getElementById("confirm-pw").value
    document.getElementById("error-msg").style.display = "none"

    if (!np || !cp) { showError("Rellena ambos campos"); return }
    if (np !== cp) { showError("Las contraseñas no coinciden"); return }
    if (np.length < 8) { showError("Mínimo 8 caracteres"); return }

    const btn = document.getElementById("submit-btn")
    btn.disabled = true

    try {
        const r = await fetch(API + "/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, newPassword: np }),
        })
        const d = await r.json()
        if (!r.ok) { showError(d.error ?? "Error. El enlace puede haber expirado."); btn.disabled = false; return }
        document.getElementById("form-body").style.display = "none"
        document.getElementById("success-msg").innerHTML = 'Contraseña guardada. <a href="/app/login" style="color:#8b5cf6;font-weight:600;">Inicia sesión en Fromly →</a>'
        document.getElementById("success-msg").style.display = "block"
        setTimeout(() => { window.location.href = "/app/login" }, 2500)
    } catch { showError("Error de conexión"); btn.disabled = false }
}

function showError(m) { const e = document.getElementById("error-msg"); e.textContent = m; e.style.display = "block" }

document.addEventListener("keydown", e => { if (e.key === "Enter") submit() })
</script>
</body>
</html>
