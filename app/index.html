    <!-- Google/Apple scripts se cargan dinámicamente solo en AuthPage para no interferir con el DOM de React -->

    <!-- Loading screen: visible desde el primer frame, antes de que React ejecute -->
    <style>
      #app-loading {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: var(--from-bg, #ffffff);
        transition: opacity 0.25s ease;
        pointer-events: none;
      }
      #app-loading.hidden { opacity: 0; }
      html[data-theme="dark"]  { --from-bg: #0f0f10; }
      html[data-theme="light"] { --from-bg: #ffffff; }
      .from-loader { display: flex; gap: 7px; align-items: center; }
      .from-loader-dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: #8b5cf6; opacity: 0.2;
        animation: from-dot 1.2s ease-in-out infinite;
      }
      .from-loader-dot:nth-child(2) { animation-delay: 0.18s; }
      .from-loader-dot:nth-child(3) { animation-delay: 0.36s; }
      @keyframes from-dot {
        0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
        40%            { opacity: 1;    transform: scale(1.1); }
      }
    </style>
    <!-- Detectar tema almacenado para que el fondo coincida desde el primer frame -->
    <script>
      try {
        var t = localStorage.getItem('from-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      } catch(e) {}
    </script>
    <script type="module" crossorigin src="/app/assets/index-BKUTh5XH.js"></script>
    <link rel="modulepreload" crossorigin href="/app/assets/react-vendor-BUzs8Qy9.js">

    <link rel="stylesheet" crossorigin href="/app/assets/index-CE5KzNxG.css">
