<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fromly</title>
  <script>
    // GitHub Pages SPA redirect — redirige /app/ruta → /app/?p=ruta
    // main.tsx lee ?p= y restaura la ruta para React Router
    (function () {
      var path = window.location.pathname;
      // Notas públicas: fromly.app/p/<slug> lo renderiza el servidor (GitHub Pages
      // no tiene esa ruta). Redirigir al endpoint público del servidor.
      if (path.indexOf('/p/') === 0) {
        window.location.replace('https://from-server-production.up.railway.app' + path + (window.location.search || ''));
        return;
      }
      if (path.startsWith('/app')) {
        // Extrae la sub-ruta sin el prefijo /app y sin la barra inicial
        var sub = path.replace(/^\/app\/?/, '') || '';
        // Incluir el search string (ej: ?code=...&state=...) para no perder params OAuth
        var fullSub = sub + (window.location.search || '');
        var qs = fullSub ? '?p=' + encodeURIComponent(fullSub) : '';
        var hash = window.location.hash || '';
        window.location.replace('/app/' + qs + hash);
      } else {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body></body>
</html>
